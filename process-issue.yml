name: Process Coffee Journal Issue

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  process-journal-entry:
    if: contains(github.event.issue.labels.*.name, 'journal-entry') || startsWith(github.event.issue.title, '[Journal]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse and append journal entry
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const title = context.payload.issue.title || '';
            const issueNumber = context.payload.issue.number;

            // Parse form fields from GitHub issue form
            function parseField(label, text) {
              const re = new RegExp(`### ${label}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const match = text.match(re);
              return match ? match[1].trim().replace(/^_No response_$/i, '') : '';
            }

            const entry = {
              id: `entry-${issueNumber}-${Date.now()}`,
              issueNumber,
              date: new Date().toISOString().split('T')[0],
              beanName: parseField('Bean Name', body),
              roasterName: parseField('Roaster Name', body),
              roasterId: parseField('Roaster ID', body),
              origin: parseField('Origin', body),
              roastLevel: parseField('Roast Level', body),
              brewMethod: parseField('Brew Method', body),
              grindClicks: parseInt(parseField('Grind Clicks', body)) || null,
              grindLabel: parseField('Grind Label', body),
              dose: parseField('Dose', body),
              water: parseField('Water', body),
              ratio: parseField('Ratio', body),
              totalTime: parseField('Total Time', body),
              waterTemp: parseField('Water Temperature', body),
              scores: {
                acidity: parseInt(parseField('Acidity Score', body)) || 0,
                body: parseInt(parseField('Body Score', body)) || 0,
                sweetness: parseInt(parseField('Sweetness Score', body)) || 0,
                finish: parseInt(parseField('Finish Score', body)) || 0
              },
              overallRating: parseFloat(parseField('Overall Rating', body)) || 0,
              tasteTags: parseField('Taste Tags', body).split(',').map(t => t.trim()).filter(Boolean),
              notes: parseField('Tasting Notes', body)
            };

            // Read existing journal
            const fs = require('fs');
            const journalPath = 'data/journal.json';
            let journal = [];
            try {
              journal = JSON.parse(fs.readFileSync(journalPath, 'utf8'));
            } catch(e) { journal = []; }

            journal.unshift(entry); // newest first
            fs.writeFileSync(journalPath, JSON.stringify(journal, null, 2));

            // Comment on issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ **Journal entry logged!**\n\n**${entry.beanName}** from ${entry.roasterName} has been added to your coffee journal.\n\nView it live at: https://rathialok901.github.io/coffee-fever`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });

      - name: Commit journal update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/journal.json
          git diff --staged --quiet || git commit -m "☕ Add journal entry #${{ github.event.issue.number }}"
          git push

  process-roaster:
    if: contains(github.event.issue.labels.*.name, 'new-roaster') || startsWith(github.event.issue.title, '[Roaster]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse and append roaster
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            function parseField(label, text) {
              const re = new RegExp(`### ${label}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`, 'i');
              const match = text.match(re);
              return match ? match[1].trim().replace(/^_No response_$/i, '') : '';
            }

            const name = parseField('Roaster Name', body);
            const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

            const roaster = {
              id,
              name,
              location: parseField('Location', body),
              country: parseField('Country', body),
              website: parseField('Website', body),
              description: parseField('Description', body),
              logo: `${name} coffee roaster`,
              speciality: parseField('Specialities', body).split(',').map(s => s.trim()).filter(Boolean),
              roastLevels: parseField('Roast Levels', body).split(',').map(s => s.trim()).filter(Boolean),
              added: new Date().toISOString().split('T')[0]
            };

            const fs = require('fs');
            const path = 'data/roasters.json';
            let roasters = [];
            try { roasters = JSON.parse(fs.readFileSync(path, 'utf8')); } catch(e) {}
            if (!roasters.find(r => r.id === id)) {
              roasters.push(roaster);
              fs.writeFileSync(path, JSON.stringify(roasters, null, 2));
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ **${name}** has been added to your roasters list!\n\nView at: https://rathialok901.github.io/coffee-fever`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });

      - name: Commit roaster update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/roasters.json
          git diff --staged --quiet || git commit -m "🏭 Add roaster via issue #${{ github.event.issue.number }}"
          git push
