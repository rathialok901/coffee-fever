name: 🏭 Add a New Roaster
description: Add a new roaster to your coffee map
title: "[Roaster] "
labels: ["new-roaster"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🏭 Add a New Roaster
        Once submitted, this roaster will appear on your site automatically.

  - type: input
    id: roaster-name
    attributes:
      label: Roaster Name
      placeholder: e.g. Subko Coffee Roasters
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: e.g. Mumbai, India

  - type: input
    id: country
    attributes:
      label: Country
      placeholder: e.g. India

  - type: input
    id: website
    attributes:
      label: Website
      placeholder: e.g. https://subko.coffee

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A short paragraph about this roaster — sourcing philosophy, what makes them special
      rows: 3

  - type: input
    id: specialities
    attributes:
      label: Specialities
      description: Comma-separated tags
      placeholder: e.g. Single Origin, Direct Trade, Natural Process

  - type: input
    id: roast-levels
    attributes:
      label: Roast Levels
      description: Comma-separated levels they offer
      placeholder: e.g. Light, Medium, Dark
